name: npm-publish

on:
  workflow_run:
    workflows:
      - release
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish from, for example v0.1.5.
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       startsWith(github.event.workflow_run.head_branch, 'v'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          ref: ${{ inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify release tag matches npm package version
        shell: bash
        run: |
          PKG_VERSION=$(node -p "require('./npm/package.json').version")
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            TAG_NAME="${{ github.event.workflow_run.head_branch }}"
          else
            TAG_NAME="${{ inputs.tag }}"
          fi
          case "$TAG_NAME" in
            v*) ;;
            *)
              echo "::error::npm publish requires a v* release tag, got '$TAG_NAME'"
              exit 1
              ;;
          esac
          test "v${PKG_VERSION}" = "${TAG_NAME}"

      - name: Publish npm package with provenance
        working-directory: npm
        run: npm publish --provenance --access public
